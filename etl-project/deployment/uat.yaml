apiVersion: v1
kind: ConfigMap
metadata:
  name: cust-risk-pipeline-uat
data:
  APP_NAME: cust-risk-triggers
  ENV: uat
  SPARK_MODE: batch
  DRIVER_MEMORY: 4g
  EXECUTOR_MEMORY: 8g
  EXECUTOR_CORES: "4"
  NUM_EXECUTORS: "8"
---
apiVersion: v1
kind: Secret
metadata:
  name: cust-risk-secrets-uat
type: Opaque
data:
  VAULT_SYNAPSE_USER: <base64-placeholder>
  VAULT_SYNAPSE_PASSWORD: <base64-placeholder>

