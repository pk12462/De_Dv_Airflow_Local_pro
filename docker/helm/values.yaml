namespace: de-dv

images:
  streaming:
    repository: de-dv/streaming-app
    tag: latest
    pullPolicy: IfNotPresent
  batch:
    repository: de-dv/batch-app
    tag: latest
    pullPolicy: IfNotPresent
  airflow:
    repository: de-dv/airflow
    tag: 2.11.0
    pullPolicy: IfNotPresent

replicaCount:
  streaming: 1
  batch: 1
  airflow: 1

service:
  type: ClusterIP
  streamingPort: 8090
  batchPort: 8091
  airflowPort: 8080

resources:
  streaming:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi
  batch:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

env:
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  SPARK_MASTER_URL: local[*]
  LOG_LEVEL: INFO
  PIPELINE_CONFIG_PATH: pipelines/configs/app_connection_config.yaml

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: de-dv.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

